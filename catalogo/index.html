<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo Médico - Evelyn Fabiola</title>

  <!-- Librería PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f7fb;
    }

    header {
      background: #0ea5e9;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      width: 90%;
      margin: auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    button {
      background: #0ea5e9;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0284c7;
    }

    .carrito {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Catálogo de Insumos Médicos</h1>
  <p>Elaborado por: Evelyn Fabiola</p>
</header>

<div class="container">

  <h2>Productos</h2>

  <div class="grid">

    <div class="card">
      <h3>Guantes quirúrgicos</h3>
      <p>Precio: 20.000 Gs</p>
      <button onclick="agregar('Guantes quirúrgicos', 20000)">Agregar</button>
    </div>

    <div class="card">
      <h3>Alcohol 70%</h3>
      <p>Precio: 15.000 Gs</p>
      <button onclick="agregar('Alcohol 70%', 15000)">Agregar</button>
    </div>

    <div class="card">
      <h3>Mascarillas</h3>
      <p>Precio: 10.000 Gs</p>
      <button onclick="agregar('Mascarillas', 10000)">Agregar</button>
    </div>

    <div class="card">
      <h3>Jeringas</h3>
      <p>Precio: 5.000 Gs</p>
      <button onclick="agregar('Jeringas', 5000)">Agregar</button>
    </div>

  </div>

  <div class="carrito">
    <h2>Carrito</h2>
    <ul id="lista"></ul>
    <h3>Total: <span id="total">0</span> Gs</h3>

    <button onclick="generarPDF()">Generar Comprobante PDF</button>
  </div>

</div>

<script>
  let carrito = [];
  let total = 0;

  function agregar(nombre, precio) {
    carrito.push({nombre, precio});
    total += precio;

    mostrar();
  }

  function mostrar() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    carrito.forEach(item => {
      let li = document.createElement("li");
      li.textContent = item.nombre + " - " + item.precio + " Gs";
      lista.appendChild(li);
    });

    document.getElementById("total").innerText = total;
  }

  function generarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text("Comprobante de Compra", 20, 20);
    doc.text("Cliente: Evelyn Fabiola", 20, 30);

    let y = 40;

    carrito.forEach(item => {
      doc.text(item.nombre + " - " + item.precio + " Gs", 20, y);
      y += 10;
    });

    doc.text("Total: " + total + " Gs", 20, y + 10);

    doc.save("comprobante.pdf");
  }
</script>

</body>
</html>
